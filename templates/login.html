{% extends "base.html" %}

{% block title %}Login | Ershad{% endblock %}

{% block content %}
<section class="panel narrow">
    <h1>Sign in</h1>
    <p class="muted">Use the student name and student number to access the dashboard.</p>
    <form method="POST" class="form-grid">
        <label for="student_name">Student name</label>
        <input id="student_name" name="student_name" type="text" autocomplete="name" required>

        <label for="student_number">Student number</label>
        <input id="student_number" name="student_number" type="text" inputmode="numeric" required>

        <button type="submit">Login</button>
    </form>
</section>
{% endblock %}
