{% extends "base.html" %}

{% block title %}Login | Ershad{% endblock %}

{% block head_extra %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block content %}
<section class="panel narrow">
    <h1>Sign In</h1>
    <p class="muted">Use the student name and student ID to access the dashboard.</p>
    <form method="POST" class="form-grid">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label for="student_name">Student name</label>
        <input id="student_name" name="student_name" type="text" autocomplete="name" maxlength="120" required>

        <label for="student_number">Student ID</label>
        <input id="student_number" name="student_number" type="text" inputmode="numeric" maxlength="32" required>

        <button type="submit">Sign in</button>
    </form>
</section>
{% endblock %}
