<nav class="glass-nav">
    <div class="nav-container">
        <a href="{{ url_for('main.home') }}" class="logo">
            <i class="fas fa-seedling"></i>
            <span>إرشاد</span>
        </a>

        <ul class="nav-menu" id="nav-menu">
            <li><a href="{{ url_for('main.home') }}" class="nav-link">الرئيسية</a></li>
            {% if current_user.is_authenticated %}
                {% if current_user.role == 'admin' %}
                    <li><a href="{{ url_for('auth.add_user') }}" class="nav-link admin-link">إدارة الطلاب</a></li>
                {% endif %}
                <li><a href="#" class="nav-link">صندوق الرسائل</a></li>
                <li><a href="{{ url_for('auth.logout') }}" class="btn-logout">خروج</a></li>
            {% else %}
                <li><a href="{{ url_for('auth.login') }}" class="btn-login">دخول</a></li>
            {% endif %}
        </ul>

        <div class="hamburger" id="hamburger-btn">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span> </div>
    </div>
</nav>


<script>
    const hamburger = document.getElementById("hamburger-btn");
const navMenu = document.getElementById("nav-menu");

hamburger.onclick = function() {
    hamburger.classList.toggle("active");
    navMenu.classList.toggle("active");
}

window.onclick = function(event) {
    if (!hamburger.contains(event.target) && !navMenu.contains(event.target)) {
        hamburger.classList.remove("active");
        navMenu.classList.remove("active");
    }
}
</script>
