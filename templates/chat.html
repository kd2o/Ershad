{% extends "base.html" %}
{% block content %}
<div class="panel">
    <h3>محادثة فورية</h3>
    
    <select id="recipient_id" class="form-control">
        <option value="" disabled selected>اختر شخصاً للمراسلة</option>
        {% for user in users %}
            <option value="{{ user._id }}">{{ user.student_name }}</option>
        {% endfor %}
    </select>

    <div id="chat-box" style="height: 300px; border: 1px solid #ddd; overflow-y: auto; padding: 15px; margin: 15px 0; background: #fff;">
        </div>

    <div style="display: flex; gap: 5px;">
        <input type="text" id="message_text" class="form-control" placeholder="اكتب هنا...">
        <button onclick="sendMsg()" class="btn btn-primary">إرسال</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io();

    // مهم: عند اختيار اسم، ننضم للغرفة فوراً
    document.getElementById('recipient_id').onchange = function() {
        const recipient_id = this.value;
        socket.emit('join_chat', {'recipient_id': recipient_id});
        document.getElementById('chat-box').innerHTML = '<p class="text-center text-muted">بدأت المحادثة</p>';
    };

    function sendMsg() {
        const recipient = document.getElementById('recipient_id').value;
        const msgInput = document.getElementById('message_text');
        
        if (!recipient) { alert("اختر مستخدماً أولاً!"); return; }
        if (!msgInput.value.trim()) return;

        socket.emit('private_message', {
            'recipient_id': recipient,
            'message': msgInput.value
        });
        
        msgInput.value = '';
    }

    socket.on('new_message', function(data) {
        const chatBox = document.getElementById('chat-box');
        const currentUserId = "{{ current_user.get_id() }}";
        const isMe = data.sender_id === currentUserId;

        const html = `
            <div style="text-align: ${isMe ? 'left' : 'right'}; margin-bottom: 10px;">
                <div style="display: inline-block; padding: 8px 12px; border-radius: 15px; 
                            background: ${isMe ? '#e3f2fd' : '#f1f1f1'}; 
                            color: ${isMe ? '#0d47a1' : '#333'};">
                    <strong>${isMe ? 'أنت' : data.sender}:</strong> ${data.msg}
                </div>
            </div>`;
        
        chatBox.innerHTML += html;
        chatBox.scrollTop = chatBox.scrollHeight;
    });
</script>
{% endblock %}
